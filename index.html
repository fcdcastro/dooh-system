<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOH News - Brasil & Mundo</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DOOH News">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Main News Content -->
        <main class="news-display" id="news-container">
            <img src="" alt="" class="news-image" id="news-img">
            
            <!-- Floating Widgets -->
            <div class="top-widgets">
                <div class="glass-widget currency-bar">
                    <div class="currency-mini">USD <span id="usd-rate">--</span></div>
                    <div class="currency-mini">EUR <span id="eur-rate">--</span></div>
                </div>
                
                <div class="glass-widget weather-mini">
                    <img id="weather-icon" src="" alt="" style="width: 50px; display: none;">
                    <div>
                        <div id="weather-temp" style="font-weight: 800;">--°C</div>
                        <div id="weather-city" style="font-size: 10px; opacity: 0.7;">Detectando...</div>
                    </div>
                </div>

                <div class="glass-widget clock-widget">
                    <div id="clock">00:00:00</div>
                    <div id="date" style="font-size: 10px; opacity: 0.7;">--/--/----</div>
                </div>
            </div>

            <div class="news-overlay">
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                    <span class="news-source" id="news-source" style="margin-bottom: 0;">Carregando...</span>
                    <button id="btn-speak" class="icon-button" title="Ouvir Notícia" style="background: #fff; color: #000; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); width: 50px; height: 50px;">
                        <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    </button>
                    <span id="speech-status" style="font-size: 12px; font-weight: 800; color: var(--accent-color); display: none; text-transform: uppercase; letter-spacing: 1px;">• Falando</span>
                </div>
                <h1 class="news-title" id="news-title">Buscando as últimas notícias...</h1>
                <p class="news-summary" id="news-summary">Aguarde um momento enquanto atualizamos as informações.</p>
                <div id="weather-desc" style="font-size: 14px; margin-top: 10px; color: var(--accent-color);"></div>
            </div>
            
            <div class="progress-container" id="progress-bar"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
