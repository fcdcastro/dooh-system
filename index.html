<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOH News - Brasil & Mundo</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DOOH News">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Main News Content -->
        <main class="news-display" id="news-container">
            <img src="" alt="" class="news-image" id="news-img">
            
            <!-- Floating Widgets -->
            <div class="top-widgets">
                <div class="glass-widget currency-bar">
                    <div class="currency-mini">USD <span id="usd-rate">--</span></div>
                    <div class="currency-mini">EUR <span id="eur-rate">--</span></div>
                </div>
                
                <div class="glass-widget weather-mini">
                    <img id="weather-icon" src="" alt="" style="width: 50px; display: none;">
                    <div>
                        <div id="weather-temp" style="font-weight: 800;">--°C</div>
                        <div id="weather-city" style="font-size: 10px; opacity: 0.7;">Detectando...</div>
                    </div>
                </div>

                <div class="glass-widget clock-widget">
                    <div id="clock">00:00:00</div>
                    <div id="date" style="font-size: 10px; opacity: 0.7;">--/--/----</div>
                </div>
            </div>

            <div class="news-overlay">
                <span class="news-source" id="news-source">Carregando...</span>
                <h1 class="news-title" id="news-title">Buscando as últimas notícias...</h1>
                <p class="news-summary" id="news-summary">Aguarde um momento enquanto atualizamos as informações.</p>
                <div id="weather-desc" style="font-size: 14px; margin-top: 10px; color: var(--accent-color);"></div>
            </div>
            
            <div class="progress-container" id="progress-bar"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
