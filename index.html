<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOH News - Brasil & Mundo</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DOOH News">
    <link rel="apple-touch-icon" href="icon.png">

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</head>

<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease;">
        <div style="text-align: center;">
            <div
                style="width: 50px; height: 50px; border: 4px solid var(--accent-color); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;">
            </div>
            <p style="font-weight: 800; letter-spacing: 2px; text-transform: uppercase;">Iniciando Sistema...</p>
        </div>
    </div>
    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <!-- Daily Briefing Overlay -->
    <div id="briefing-overlay" class="briefing-overlay" style="display: none;">
        <div class="briefing-content">
            <h2 class="briefing-tag">Principais Notícias do Dia</h2>
            <p class="briefing-subtitle">As principais manchetes selecionadas para você</p>
            <div id="briefing-list" class="briefing-list"></div>
        </div>
    </div>

    <div class="app-container">
        <!-- Main News Content -->
        <main class="news-display" id="news-container">
            <div class="news-image-container">
                <img src="" alt="" class="news-image ken-burns" id="news-img">
            </div>

            <!-- Floating Widgets -->
            <div class="top-widgets">
                <div class="widgets-group">
                    <div class="glass-widget currency-bar">
                        <div class="currency-item">
                            <label>Dólar</label>
                            <span id="usd-rate">--</span>
                        </div>
                        <div class="currency-item">
                            <label>Euro</label>
                            <span id="eur-rate">--</span>
                        </div>
                    </div>

                    <div class="glass-widget weather-widget">
                        <img id="weather-icon" src="" alt="" style="width: 44px; display: none;">
                        <div>
                            <div id="weather-temp">--°C</div>
                            <div id="weather-city" style="font-size: 10px; opacity: 0.6; text-transform: uppercase;">
                                Detectando...</div>
                        </div>
                    </div>
                </div>

                <div class="glass-widget clock-widget">
                    <div id="clock">00:00:00</div>
                    <div id="date">--/--/----</div>
                </div>
            </div>

            <div class="news-overlay">
                <div style="display: flex; align-items: center; gap: 20px;">
                    <span class="news-source" id="news-source">Carregando...</span>
                </div>
                <h1 class="news-title" id="news-title">Sintonizando as principais notícias...</h1>
                <p class="news-summary" id="news-summary">Aguarde enquanto carregamos as últimas informações do Brasil e
                    do Mundo.</p>
                <div id="weather-desc"
                    style="font-size: 14px; font-weight: 700; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px;">
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
        </main>
    </div>

    <script src="script-v3.js"></script>
</body>

</html>
